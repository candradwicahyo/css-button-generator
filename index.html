<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.css">
  <link rel="stylesheet" href="style.css">
  <title>css button generator</title>
</head>
<body>

  <div class="container my-5">
    <div class="row">
      <div class="col-md">

        <div class="row">
          <div class="col-md-6">
            <div class="accordion accordion-flush" id="accordionFlushExample">
              <!-- accordion item -->
              <div class="accordion-item">
                <h2 class="accordion-header" id="flush-headingOne">
                  <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">
                    font / text
                  </button>
                </h2>
                <div id="flush-collapseOne" class="accordion-collapse collapse" aria-labelledby="flush-headingOne" data-bs-parent="#accordionFlushExample">
                  <div class="accordion-body">
                    <!-- content -->
                    <div class="form-group mb-3">
                      <label for="text" class="form-label fw-light">Text</label>
                      <input type="text" id="text" class="form-control input" placeholder="enter something here ...">
                    </div>
                    <div class="form-group mb-3">
                      <label for="font-color" class="form-label fw-light">font color</label>
                      <div class="d-flex justify-content-center align-items-center">
                        <input type="text" id="font-color" class="form-control input" placeholder="#000000">
                        <div class="mx-1"></div>
                        <input type="color" class="form-control form-control-color" id="input-color">
                      </div>
                      <p class="fw-light mt-2">input color will change color if you enter hex color</p>
                    </div>
                    <div class="d-flex justify-content-center align-items-center">
                      <div class="form-group">
                        <label for="font-weight" class="form-label fw-light">font weight</label>
                        <input type="number" id="font-weight" class="form-control input">
                      </div>
                      <div class="mx-1"></div>
                      <div class="form-group">
                        <label for="font-size" class="form-label fw-light">font size</label>
                        <input type="number" id="font-size" class="form-control input">
                      </div>
                    </div>
                    <!-- end of content -->
                  </div>
                </div>
              </div>
              <div class="accordion-item">
                <h2 class="accordion-header" id="flush-headingOne">
                  <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseTwo" aria-expanded="false" aria-controls="flush-collapseOne">
                    border
                  </button>
                </h2>
                <div id="flush-collapseTwo" class="accordion-collapse collapse" aria-labelledby="flush-headingOne" data-bs-parent="#accordionFlushExample">
                  <div class="accordion-body">
                    <!-- content -->
                    <div class="d-flex justify-content-center align-items-center">
                      <div class="form-group">
                        <label for="border" class="form-label fw-light">border</label>
                        <input type="number" id="border" class="form-control input">
                      </div>
                      <div class="mx-1"></div>
                      <div class="form-group">
                        <label for="border-radius" class="form-label fw-light">border radius</label>
                        <input type="number" id="border-radius" class="form-control input">
                      </div>
                    </div>
                    <!-- end of content -->
                  </div>
                </div>
              </div>
              <div class="accordion-item">
                <h2 class="accordion-header" id="flush-headingOne">
                  <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseThree" aria-expanded="false" aria-controls="flush-collapseOne">
                    box shadow / padding
                  </button>
                </h2>
                <div id="flush-collapseThree" class="accordion-collapse collapse show" aria-labelledby="flush-headingOne" data-bs-parent="#accordionFlushExample">
                  <div class="accordion-body">
                    <!-- content -->
                    <div class="form-group mb-3">
                      <label for="padding" class="form-label fw-light">padding</label>
                      <div class="d-flex justify-content-center align-items-center">
                        <div class="d-flex align-items-center">
                          <label for="pt" class="form-label fw-light my-auto">pt</label>
                          <div class="mx-1"></div>
                          <input type="number" id="pt" class="form-control text-center input" value="0">
                        </div>
                        <div class="mx-1"></div>
                        <div class="d-flex align-items-center">
                          <label for="pr" class="form-label fw-light my-auto">pr</label>
                          <div class="mx-1"></div>
                          <input type="number" id="pr" class="form-control text-center input" value="0">
                        </div>
                        <div class="mx-1"></div>
                        <div class="d-flex align-items-center">
                          <label for="pb" class="form-label fw-light my-auto">pb</label>
                          <div class="mx-1"></div>
                          <input type="number" id="pb" class="form-control text-center input" value="0">
                        </div>
                        <div class="mx-1"></div>
                        <div class="d-flex align-items-center">
                          <label for="pl" class="form-label fw-light my-auto">pl</label>
                          <div class="mx-1"></div>
                          <input type="number" id="pl" class="form-control text-center input" value="0">
                        </div>
                      </div>
                    </div>
                    <div class="form-group mb-3">
                      <label for="bs-color" class="form-label fw-light">box shadow color</label>
                      <input type="text" id="bs-color" class="form-control input" value="black">
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                      <div class="form-group">
                        <label for="hor" class="form-label fw-light">horizontal</label>
                        <div class="mx-1"></div>
                        <input type="number" id="hor" class="form-control input" value="0">
                      </div>
                      <div class="mx-1"></div>
                      <div class="form-group">
                        <label for="ver" class="form-label fw-light">vertical</label>
                        <div class="mx-1"></div>
                        <input type="number" id="ver" class="form-control input" value="0">
                      </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                      <div class="form-group">
                        <label for="blur" class="form-label fw-light">blur</label>
                        <div class="mx-1"></div>
                        <input type="number" id="blur" class="form-control input" value="0">
                      </div>
                      <div class="mx-1"></div>
                      <div class="form-group">
                        <label for="spread" class="form-label fw-light">spread</label>
                        <div class="mx-1"></div>
                        <input type="number" id="spread" class="form-control input" value="0">
                      </div>
                    </div>
                    <!-- end of content -->
                  </div>
                </div>
              </div>
              <div class="accordion-item">
                <h2 class="accordion-header" id="flush-headingOne">
                  <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseFour" aria-expanded="false" aria-controls="flush-collapseOne">
                    background
                  </button>
                </h2>
                <div id="flush-collapseFour" class="accordion-collapse collapse" aria-labelledby="flush-headingOne" data-bs-parent="#accordionFlushExample">
                  <div class="accordion-body">
                    <div class="form-group mb-3">
                      <label for="bg-color" class="form-label fw-light">background</label>
                      <input type="text" id="bg-color" class="form-control input">
                    </div>
                    <button class="btn btn-primary rounded-1 fw-semibold w-100 generate">
                      generate hex color
                    </button>
                  </div>
                </div>
              </div>
              <!-- end of accordion item -->
            </div>
          </div>
          <div class="col-md">
            <h4 class="fw-light mb-3">button preview</h4>
            <div class="box-preview">
              <button class="button">click here</button>
            </div>
            <button class="btn btn-primary py-2 px-3 rounded-1 w-100 my-3 fw-semibold copy">copy code</button>
          </div>
        </div>

        <div class="container my-2">
          <div class="row">
            <div class="col-md">
              <textarea cols="30" rows="12" class="form-control textarea fw-light" readonly></textarea>
            </div>
          </div>
        </div>

        <div class="row my-4">
          <div class="col-md-6 mx-auto">
            <div class="d-flex justify-content-center align-items-center text-center">
              <span class="fw-light">created by <span class="fw-bold">candra dwi cahyo</span></span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="../folder/vconsole/dist/vconsole.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.js"></script>
  <script src="script.js"></script>
</body>
</html>
